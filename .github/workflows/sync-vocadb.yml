name: Sync VocaDB music data

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-vocadb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync VocaDB data
        run: npm run sync:vocadb

      - name: Build check
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Sync music catalogue from VocaDB
          branch: data/vocadb-sync
          delete-branch: true
          title: Sync music catalogue from VocaDB
          body: |
            This PR was generated by the manual VocaDB sync workflow.

            Please review `src/data/music.ts` before merging:

            - song titles
            - release dates
            - credits
            - platform links
            - generated slugs
          labels: data, music
