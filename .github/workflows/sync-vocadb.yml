name: Sync VocaDB music data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-vocadb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync VocaDB data
        run: npm run sync:vocadb

      - name: Build check
        run: npm run build

      - name: Commit synced data to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B data/vocadb-sync
          git add src/data/music.ts
          if git diff --cached --quiet; then
            echo "No VocaDB music data changes detected."
            exit 0
          fi
          git commit -m "Sync music catalogue from VocaDB"
          git push --force origin data/vocadb-sync

      - name: Print manual pull request link
        run: |
          echo "Synced data branch: data/vocadb-sync"
          echo "Open PR manually: https://github.com/LGBTALBUM/MISAKA_SARINA_N/compare/main...data/vocadb-sync?expand=1"
