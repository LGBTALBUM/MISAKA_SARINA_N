<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="17" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04" />
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.24" />
    </linearGradient>
  </defs>
  <rect width="480" height="1080" fill="#071d10" />
  <rect x="480" width="500" height="1080" fill="#270b17" />
  <rect x="980" width="460" height="1080" fill="#232405" />
  <rect x="1440" width="480" height="1080" fill="#04041c" />
  <rect x="460" width="56" height="1080" fill="#1d1b19" opacity="0.72" />
  <rect x="955" width="52" height="1080" fill="#291c14" opacity="0.66" />
  <rect x="1418" width="56" height="1080" fill="#121615" opacity="0.72" />
  <rect width="1920" height="1080" fill="url(#vignette)" />
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.55" />
</svg>
