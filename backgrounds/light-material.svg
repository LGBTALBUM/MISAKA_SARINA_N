<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="23" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="1" stop-color="#b8b0ff" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect width="480" height="1080" fill="#d2ffd8" />
  <rect x="480" width="500" height="1080" fill="#ffd7ff" />
  <rect x="980" width="460" height="1080" fill="#fffed8" />
  <rect x="1440" width="480" height="1080" fill="#d2feff" />
  <rect x="460" width="56" height="1080" fill="#fddbfb" opacity="0.6" />
  <rect x="955" width="52" height="1080" fill="#fff8d6" opacity="0.62" />
  <rect x="1418" width="56" height="1080" fill="#ddf8ff" opacity="0.65" />
  <rect width="1920" height="1080" fill="url(#soft)" />
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.5" />
</svg>
